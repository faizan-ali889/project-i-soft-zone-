version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: isoftzone_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: loginapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: isoftzone_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_USER: postgres
      DB_HOST: db
      DB_NAME: loginapp
      DB_PASSWORD: password123
      DB_PORT: 5432
      JWT_SECRET: supersecuresecretjwt12345
    depends_on:
      - db
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: isoftzone_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  backend_uploads:
  backend_logs:
